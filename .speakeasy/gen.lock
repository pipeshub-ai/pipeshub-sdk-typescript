examples:
  initAuth:
    speakeasy-default-init-auth:
      requestBody:
        application/json: {"email": "user@example.com"}
      responses:
        "200":
          application/json: {"currentStep": 0, "allowedMethods": ["password", "google", "otp"], "message": "Authentication initialized"}
        "400":
          application/json: {"error": "INVALID_CREDENTIALS", "message": "The password you entered is incorrect", "code": "AUTH_001", "statusCode": 401}
  authenticate:
    speakeasy-default-authenticate:
      parameters:
        header:
          x-session-token: "<value>"
      requestBody:
        application/json: {"method": "oauth", "credentials": {"password": "o_5N_tt72qMx3WV"}}
      responses:
        "200":
          application/json: {"message": "Fully authenticated"}
        "400":
          application/json: {"error": "INVALID_CREDENTIALS", "message": "The password you entered is incorrect", "code": "AUTH_001", "statusCode": 401}
  generateLoginOtp:
    speakeasy-default-generate-login-otp:
      requestBody:
        application/json: {"email": "Garland.Sipes42@hotmail.com"}
      responses:
        "200":
          application/json: {"message": "OTP sent to your email"}
        "400":
          application/json: {"error": "INVALID_CREDENTIALS", "message": "The password you entered is incorrect", "code": "AUTH_001", "statusCode": 401}
  resetPassword:
    speakeasy-default-reset-password:
      requestBody:
