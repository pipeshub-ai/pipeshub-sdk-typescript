examples:
  initAuth:
    speakeasy-default-init-auth:
      requestBody:
        application/json: {"email": "user@example.com"}
      responses:
        "200":
          application/json: {"currentStep": 0, "allowedMethods": ["password", "google", "otp"], "message": "Authentication initialized", "authProviders": {}, "jitEnabled": true}
        "400":
          application/json: {"error": {"code": "HTTP_BAD_REQUEST", "message": "Admin access required"}}
        "500":
          application/json: {"error": {"code": "HTTP_BAD_REQUEST", "message": "Admin access required"}}
  authenticate:
    speakeasy-default-authenticate:
      parameters:
        header:
          x-session-token: "<value>"
      requestBody:
        application/json: {"method": "oauth", "credentials": {"password": "o_5N_tt72qMx3WV"}}
      responses:
        "200":
          application/json: {"message": "Fully authenticated", "accessToken": "<value>", "refreshToken": "<value>"}
        "400":
          application/json: {"error": {"code": "HTTP_BAD_REQUEST", "message": "Admin access required"}}
        "500":
          application/json: {"error": {"code": "HTTP_BAD_REQUEST", "message": "Admin access required"}}
  generateLoginOtp:
    speakeasy-default-generate-login-otp:
      requestBody:
        application/json: {"email": "Garland.Sipes42@hotmail.com"}
      responses:
        "200":
          application/json: {"message": "OTP sent to your email"}
        "400":
          application/json: {"error": "INVALID_CREDENTIALS", "message": "The password you entered is incorrect", "code": "AUTH_001", "statusCode": 401}
  resetPassword:
    speakeasy-default-reset-password:
      requestBody:
        application/json: {"currentPassword": "fR5Alu28cPCa984", "newPassword": "vcFGz9GLaOB88kV"}
      responses:
        "200":
          application/json: {"data": "password reset", "accessToken": "<value>"}
        "400":
          application/json: {"error": {"code": "HTTP_BAD_REQUEST", "message": "Admin access required"}}
        "500":
          application/json: {"error": {"code": "HTTP_BAD_REQUEST", "message": "Admin access required"}}
  forgotPassword:
    speakeasy-default-forgot-password:
      requestBody:
        application/json: {"email": "Barton.Gutkowski68@yahoo.com"}
      responses:
        "200":
          application/json: {"message": "Password reset email sent"}
  resetPasswordWithToken:
    speakeasy-default-reset-password-with-token:
      requestBody:
        application/json: {"password": "H9GEHoL829GXj06"}
      responses:
        "200":
          application/json: {"data": "password reset"}
        "400":
          application/json: {"error": {"code": "HTTP_BAD_REQUEST", "message": "Admin access required"}}
        "500":
          application/json: {"error": {"code": "HTTP_BAD_REQUEST", "message": "Admin access required"}}
  checkPasswordStatus:
    speakeasy-default-check-password-status:
      responses:
        "200":
          application/json: {}
  refreshToken:
    speakeasy-default-refresh-token:
      responses:
        "200":
          application/json: {}
        "401":
          application/json: {"error": "INVALID_CREDENTIALS", "message": "The password you entered is incorrect", "code": "AUTH_001", "statusCode": 401}
  logout:
    speakeasy-default-logout:
      responses:
        "200":
          application/json: {"message": "Logged out successfully"}
  exchangeOAuthCode:
    speakeasy-default-exchange-O-auth-code:
      requestBody:
        application/json: {"code": "<value>", "email": "Jason2@gmail.com", "provider": "<value>", "redirectUri": "https://enlightened-developing.info"}
      responses:
        "200":
          application/json: {"token_type": "Bearer"}
        "400":
          application/json: {"error": "INVALID_CREDENTIALS", "message": "The password you entered is incorrect", "code": "AUTH_001", "statusCode": 401}
  oauthAuthorize:
    speakeasy-default-oauth-authorize:
      parameters:
        query:
          response_type: "code"
          client_id: "<id>"
          redirect_uri: "https://coordinated-dime.biz/"
          scope: "openid profile email read:records"
          state: "Delaware"
      responses:
        "400":
          application/json: {"error": "invalid_client"}
  oauthAuthorizeConsent:
    speakeasy-default-oauth-authorize-consent:
      requestBody:
        application/json: {"client_id": "<id>", "redirect_uri": "https://excellent-license.com", "scope": "<value>", "state": "South Dakota", "consent": "denied"}
      responses:
        "200":
          application/json: {}
        "400":
          application/json: {"error": "unauthorized_client"}
  oauthToken:
    speakeasy-default-oauth-token:
      requestBody:
        application/x-www-form-urlencoded: {"grant_type": "client_credentials"}
        application/json: {"grant_type": "client_credentials"}
      responses:
        "200":
          application/json: {"token_type": "Bearer", "expires_in": 3600}
        "400":
          application/json: {"error": "unsupported_grant_type"}
  oauthRevoke:
    speakeasy-default-oauth-revoke:
      requestBody:
        application/x-www-form-urlencoded: {"token": "<value>", "client_id": "<id>"}
        application/json: {"token": "<value>", "client_id": "<id>"}
      responses:
        "401":
          application/json: {"error": "access_denied"}
  oauthIntrospect:
    active:
      requestBody:
        application/x-www-form-urlencoded: {"token": "<value>", "client_id": "<id>"}
        application/json: {"token": "<value>", "client_id": "<id>"}
      responses:
        "200":
          application/json: {"active": true, "scope": "openid profile email", "client_id": "abc123", "username": "user@example.com", "token_type": "Bearer", "exp": 1735686000, "iat": 1735682400, "user_id": "user-id-123", "iss": "https://api.pipeshub.com"}
    inactive:
      requestBody:
        application/x-www-form-urlencoded: {"token": "<value>", "client_id": "<id>"}
        application/json: {"token": "<value>", "client_id": "<id>"}
      responses:
        "200":
          application/json: {"active": false}
  oauthUserInfo:
    speakeasy-default-oauth-user-info:
      responses:
        "200":
          application/json: {"user_id": "<id>"}
  openidConfiguration:
    speakeasy-default-openid-configuration:
      responses:
        "200":
          application/json: {"scopes_supported": ["openid", "profile", "email", "read:records", "write:records"], "response_types_supported": ["code"], "grant_types_supported": ["authorization_code", "client_credentials", "refresh_token"], "token_endpoint_auth_methods_supported": ["client_secret_basic", "client_secret_post"], "subject_types_supported": ["public"], "id_token_signing_alg_values_supported": ["HS256", "RS256"], "claims_supported": ["sub", "iss", "aud", "exp", "iat", "email", "name"], "code_challenge_methods_supported": ["S256", "plain"]}
  jwks:
    speakeasy-default-jwks:
      responses:
        "200":
          application/json: {"keys": [{"kty": "RSA", "use": "sig", "alg": "RS256", "e": "AQAB"}]}
  listOAuthApps:
    speakeasy-default-list-O-auth-apps:
      parameters:
        query:
          page: 1
          limit: 20
      responses:
        "200":
          application/json: {}
  createOAuthApp:
    speakeasy-default-create-O-auth-app:
      requestBody:
        application/json: {"name": "My Integration App", "description": "Integrates PipesHub with our internal tools", "redirectUris": ["https://myapp.com/callback", "http://localhost:3000/callback"], "allowedGrantTypes": ["authorization_code", "refresh_token"], "allowedScopes": ["openid", "profile", "read:records"], "isConfidential": true, "accessTokenLifetime": 3600, "refreshTokenLifetime": 604800}
      responses:
        "201":
          application/json: {"clientSecret": "<value>"}
  listOAuthScopes:
    speakeasy-default-list-O-auth-scopes:
      responses:
        "200":
